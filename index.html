<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agara Coffee - Morning Landing Page Mockup</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,.45), rgba(0,0,0,.45)),
    url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1600&q=80');
  background-size:cover;
  background-position:center;
  min-height:100vh;
}
.hero{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;

  padding:20px;
}
h1{font-size:3rem;margin-bottom:.5rem;}
p{max-width:700px;font-size:1.2rem;line-height:1.6;}
.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 28px;
  background:white;
  color:#333;
  text-decoration:none;
  border-radius:30px;
  font-weight:bold;
}
.note{
  margin-top:20px;
  font-size:.9rem;
  opacity:.9;
}
</style>
</head>
<body>
<div class="hero">
  <h1>Magandang Umaga kasama ang Agara Coffee</h1>
  <p>
    Simulan ang araw nang may ngiti, init ng kape, at masayang usapan.
    Isang simpleng kuwentuhan na maaari ding i-customize para sa isang ambassador o reseller.
  </p>
  <a class="btn" href="#">Learn More</a>
  <div class="note">
    Demo concept only. Iwasan lang natin ang mga hindi pa napatunayang health claims.

</html>
